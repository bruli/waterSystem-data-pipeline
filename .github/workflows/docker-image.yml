name: Docker Image

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/bruli/watersystem-data-pipeline
  DEPLOYMENT_FILE: manifests/deployment.yaml

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.event.release.tag_name }}

      - name: Update deployment image
        run: |
          sed -i "s|image: .*|image: ${{ env.IMAGE_NAME }}:${{ github.event.release.tag_name }}|" ${{ env.DEPLOYMENT_FILE }}

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add ${{ env.DEPLOYMENT_FILE }}
          git commit -m "chore: deploy ${{ github.event.release.tag_name }} [skip ci]"
          git push