name: Release and Docker image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

env:
  DEPLOYMENT_FILE: manifests/deployment.yaml

jobs:
  release:
    runs-on: ubuntu-latest

    outputs:
      released: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: release
    if: needs.release.outputs.released == 'true'

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/bruli/watersystem-data-pipeline:v${{ needs.release.outputs.version }}
            ghcr.io/bruli/watersystem-data-pipeline:latest

      - name: Update deployment image tag
        run: |
          VERSION=v${{ needs.release.outputs.version }}

          sed -i "s|ghcr.io/bruli/watersystem-data-pipeline:.*|ghcr.io/bruli/watersystem-data-pipeline:${VERSION}|g" "${{ env.DEPLOYMENT_FILE }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "${{ env.DEPLOYMENT_FILE }}"
          git commit -m "chore: update image to ${VERSION}"
          git push