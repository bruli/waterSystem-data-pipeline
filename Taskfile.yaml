version: '3'

vars:
  APP: 'watersystem-data-pipeline'
  DOCKER_COMPOSE: 'COMPOSE_BAKE=true docker compose'
  DOCKERFILE: 'Dockerfile'
  IMAGE_REG: 'ghcr.io/bruli'
  IMAGE_NAME: '{{.IMAGE_REG}}/{{.APP}}'
  VERSION: '0.12.2'
  CURRENT_IMAGE: '{{.IMAGE_NAME}}:{{.VERSION}}'
  GOLANGCI_LINT_VERSION: 'v2.11.4'

silent: false

tasks:
  default:
    desc: Show available commands
    cmds:
      - task --list

  help:
    desc: Show available commands
    cmds:
      - task --list

  docker-up:
    desc: Start services with Docker Compose
    cmds:
      - |
        set -euo pipefail
        echo "🚀 Starting services with Docker Compose..."
        {{.DOCKER_COMPOSE}} up -d --build

  docker-down:
    desc: Stop and remove Docker Compose services
    cmds:
      - |
        set -euo pipefail
        echo "🛑 Stopping and removing Docker Compose services..."
        {{.DOCKER_COMPOSE}} down

  docker-ps:
    desc: Show active Docker Compose services
    cmds:
      - |
        set -euo pipefail
        echo "📋 Active services:"
        {{.DOCKER_COMPOSE}} ps

  docker-exec:
    desc: Open shell inside the app container
    cmds:
      - |
        set -euo pipefail
        echo "🔎 Opening shell inside ..."
        {{.DOCKER_COMPOSE}} exec {{.APP}} sh

  docker-logs:
    desc: Follow logs for the app container
    cmds:
      - |
        set -euo pipefail
        echo "👀 Showing logs for container {{.APP}} (CTRL+C to exit)..."
        docker logs -f {{.APP}}

  fmt:
    desc: Format code with gofumpt
    cmds:
      - |
        set -euo pipefail
        echo "👉 Formatting code with gofumpt..."
        go tool gofumpt -w .

  security:
    desc: Check security vulnerabilities
    cmds:
      - |
        set -euo pipefail
        echo "👉 Check security"
        go tool govulncheck ./...

  install-lint:
    desc: Install golangci-lint
    cmds:
      - |
        set -euo pipefail
        echo "🔧 Installing golangci-lint {{.GOLANGCI_LINT_VERSION}}..."
        go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}}

  lint:
    desc: Run golangci-lint
    deps:
      - install-lint
    cmds:
      - |
        set -euo pipefail
        echo "🚀 Executing golangci-lint..."
        golangci-lint run ./...

  test:
    desc: Run unit tests with race detector and coverage
    cmds:
      - |
        set -euo pipefail
        echo "🧪 Running unit tests (race, JSON → tparse)..."
        go test -race ./... -json -cover -coverprofile=coverage.out | go tool tparse -all

  check:
    desc: Format, security check, lint and test
    deps:
      - fmt
      - security
      - lint
      - test

  pub-weather:
    desc: Publish weather events
    cmds:
      - |
        set -euo pipefail
        echo "🚀 Publishing weather events..."
        docker exec nats-box /scripts/publish.sh weather

  pub-logs:
    desc: Publish log events
    cmds:
      - |
        set -euo pipefail
        echo "🚀 Publishing logs events..."
        docker exec nats-box /scripts/publish.sh log

  stream-clean:
    desc: Clean stream events
    cmds:
      - |
        set -euo pipefail
        echo "🧹 Cleaning events..."
        docker exec nats-box /scripts/publish.sh clean

  clean:
    desc: Clean local artifacts
    cmds:
      - |
        set -euo pipefail
        echo "🧹 Cleaning local artifacts..."
        rm -rf bin dist coverage .*cache || true
        go clean -testcache

  docker-login:
    desc: Login to Docker registry
    cmds:
      - |
        echo "🔐 Logging into Docker registry..."
        echo "$CR_PAT" | docker login ghcr.io -u bruli --password-stdin

  docker-push-image:
    desc: Build and push Docker image
    deps:
      - docker-login
    cmds:
      - |
        echo "🐳 Building and pushing Docker image {{.CURRENT_IMAGE}} ..."
        docker buildx build \
          --platform linux/arm64 \
          -t {{.CURRENT_IMAGE}} \
          -f {{.DOCKERFILE}} \
          --push \
          .
        echo "✅ Image {{.CURRENT_IMAGE}} pushed successfully."
